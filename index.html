<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>CTF Tablet Controller</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #scanner-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; position: relative; z-index: 10; transition: opacity 0.5s; }
        .palm-area { position: relative; width: 80vw; height: 60vh; max-width: 500px; fill: none; stroke: #00ff41; stroke-width: 2; cursor: pointer; }
        .palm-area svg { width: 100%; height: 100%; filter: drop-shadow(0 0 15px #00ff41); }
        #scan-bar { position: absolute; left: 0; width: 100%; height: 4px; background: linear-gradient(to right, transparent, #00ff41, transparent); box-shadow: 0 0 20px #00ff41; top: 10%; display: none; }
        @keyframes scanning { 0% { top: 10%; } 100% { top: 90%; } }
        .status-panel { margin-top: 40px; color: #00ff41; text-align: center; letter-spacing: 3px; }
        .status-main { font-size: 2rem; font-weight: bold; }
        #matrix-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; z-index: 5; }
        .scanning-active { animation: shake 0.1s infinite; stroke: #fff !important; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, -1px); } }
    </style>
</head>
<body>
    <div id="scanner-container">
        <div class="palm-area" id="palm-trigger">
            <div id="scan-bar"></div>
            <svg viewBox="0 0 512 512"><path d="M448,192c-17.67,0-32,14.33-32,32v96c0,17.67,14.33,32,32,32s32-14.33,32-32V224C480,206.33,465.67,192,448,192z M352,128 c-17.67,0-32,14.33-32,32v160c0,17.67,14.33,32,32,32s32-14.33,32-32V160C384,142.33,369.67,128,352,128z M256,96 c-17.67,0-32,14.33-32,32v192c0,17.67,14.33,32,32,32s32-14.33,32-32V128C288,110.33,273.67,96,256,96z M160,128 c-17.67,0-32,14.33-32,32v160c0,17.67,14.33,32,32,32s32-14.33,32-32V160C192,142.33,177.67,128,160,128z M120.59,332.17 c-10.47-11.23-27.35-12.87-39.75-4.22L32,362.11V448c0,17.67,14.33,32,32,32h249.94c48.45,0,94.21-23.73,121.84-63.19l31.55-45.07 c6.88-9.83,4.24-23.32-5.88-29.83c-9.5-6.12-22.18-3.92-29.07,5.08L360,440V288c0-17.67-14.33-32-32-32s-32,14.33-32,32v96h-16v-192 c0-17.67-14.33-32-32-32s-32,14.33-32,32v192h-16V128c0-17.67-14.33-32-32-32s-32,14.33-32,32v224.51 c-1.39-0.96-2.85-1.83-4.38-2.6L120.59,332.17z"/></svg>
            <svg onclick="socket.emit('start_ceremony')"></svg>
        </div>
        <div class="status-panel">
            <div class="status-main" id="m-text">SYSTEM LOCKED</div>
            <div style="opacity:0.7">PLACE PALM TO AUTHORIZE</div>
        </div>
    </div>
    <canvas id="matrix-canvas"></canvas>

    <script>
        const socket = io('http://192.168.0.46:3000'); 
        const trigger = document.getElementById('palm-trigger');
        const bar = document.getElementById('scan-bar');
        const mText = document.getElementById('m-text');
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let pressTimer;

        const start = (e) => {
            e.preventDefault();
            trigger.classList.add('scanning-active');
            bar.style.display = 'block';
            bar.style.animation = 'scanning 1.5s infinite alternate';
            mText.innerText = 'SCANNING...';
            pressTimer = setTimeout(onSuccess, 3000);
        };

        const stop = () => {
            clearTimeout(pressTimer);
            trigger.classList.remove('scanning-active');
            bar.style.display = 'none';
            mText.innerText = 'SYSTEM LOCKED';
        };

        trigger.addEventListener('mousedown', start);
        trigger.addEventListener('touchstart', start);
        window.addEventListener('mouseup', stop);
        window.addEventListener('touchend', stop);

        function onSuccess() {
            socket.emit('start_ceremony'); // 发送给电脑
            document.getElementById('scanner-container').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('scanner-container').style.display = 'none';
                startMatrix();
            }, 500);
        }

        function startMatrix() {
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const alphabet = "01";
            const fontSize = 18;
            const columns = Math.ceil(canvas.width / fontSize); // 修复右边空白
            const drops = Array(columns).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#00ff41";
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
</body>
</html>
